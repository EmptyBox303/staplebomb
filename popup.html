<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Popup</title>
</head>
<body>
    <div style = "position: relative; width: 400px; font-size: 10pt;
        font-family:'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;">
        <div id = "showing" style = "display: none; width: 200px">
            <span>Select data/storage to be cleared:</span><br>
            <form>
                <input type="checkbox" id="session">
                <label for="session">Session data</label>
                <br>
                <input type="checkbox" id="continuous">
                <label for="continuous">Continuous tracking</label>
                <br>
    
                <input type="checkbox" id="minute">
                <label for="minute">Minute packets</label>
                <br>
    
                <input type="checkbox" id="hour">
                <label for="hour">Hour packets</label>
                <br>
    
                <input type="checkbox" id="day">
                <label for="day">Day packets</label>
                <br>
            </form>
            <br>
            <button id = "resetButton">Reset</button>
            <br>
            <br>
            <span id = "display"></span>
        </div>
        <div style = "position: absolute; right: 0px; top: 0px">
            Add websites/domains to timer: <br><br>
            <div id = "scrollWebsites" style = "overflow-y: auto; height: 70px; width: 150px;
            background-color: rgb(230,230,230);"></div>
            <br>
            Or enter your own:<br>
            <input id = "enterDomain" type = "text" plaeholder = "enter domain">
            <br>
            <span id = "domainMessage" style = "color:red"></span>
            <br>
        </div>
        
        <hr>
        <span id = "hiding">Loading...</span>
        <div style = "position: relative">
            <div style = "width: 180px; height: 180px; box-sizing:content-box; line-height: 1.6">
                <span style = "padding-bottom: 5px;">Aggregate Timer <br></span>
                
                <div style = "max-width: 100vw; overflow-y: auto; overflow-x: hidden; height: 100px;">
                    <small id = "hidelist" style = "color:grey">List of websites to track</small>
                    <div id = "websitesList"></div>
                </div>
                
                <!--
                what does the aggregate timer need?
                1. recommendation of frequented websites
                just show like the 6 most recently visited sites
                each generates clickable thing
                adds to timer list div
                2. ability to enter domains and add to timer list div
                3. ability to choose effect (alarm, close tabs, close browser)
                4. ability to save this info as a timer preference
                5. ability to start aggregate timer, which overwrites previous timer;
                -->
                
                Enter duration:<br>
                <input id = "hourEntry" type = "number" style = "width: 30px" min = "00" value = "00"> :
                <input id = "minuteEntry" type = "number" style = "width: 30px" min = "00" value = "00" max = "59"> :
                <input id = "secondEntry" type = "number" style = "width: 30px" min = "00" value = "00" max = "59">
            </div>
    
            <div style = "position: absolute; right: 0px; top: 0px">hi boys</div>
        </div>

    </div>
<script src = "src/popup.js"></script>
</body>
</html>
